name: Data Freshness Check

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate data snapshots
        run: npm run generate:all

      - name: Report data diff size
        shell: bash
        run: |
          if git diff --quiet -- src/data; then
            echo "No src/data changes detected."
            exit 0
          fi

          changed_lines="$(git diff --numstat -- src/data | awk '{added += $1; removed += $2} END {print added + removed + 0}')"
          echo "Detected src/data changes."
          echo "Changed lines: ${changed_lines}"
          git diff --stat -- src/data

          if [ "${changed_lines}" -gt 500 ]; then
            echo "Data freshness diff exceeded the review threshold."
            exit 1
          fi
